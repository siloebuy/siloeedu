function decode(b64) {
  return decodeURIComponent(atob(b64).split('').map(function(c){
    return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2);
  }).join(''));
}

var BASE_CSS = ':root{--navy:#0F2B5B;--navy-light:#1A3F7F;--navy-pale:#EBF0FA;--gold:#C8912A;--gold-light:#F0C96B;--gold-pale:#FDF8EC;--white:#FFFFFF;--gris-100:#F5F6FA;--gris-200:#E8EAF0;--gris-400:#9CA3C0;--gris-700:#4A5280;--texte:#1A2040;--vert:#16a34a;--vert-pale:#DCFCE7;--rouge:#dc2626;--rouge-pale:#FEF2F2;--orange:#ea580c;--orange-pale:#FFF7ED;--rayon:12px;--rayon-lg:20px;--ombre:0 4px 24px rgba(15,43,91,0.10);}*{box-sizing:border-box;margin:0;padding:0;}body{font-family:"Inter",sans-serif;background:var(--gris-100);color:var(--texte);}';

var ROUTE_MAP = {
  '/connexion':'connexion','/connexion.html':'connexion',
  '/inscription-eleve':'inscription-eleve','/inscription-eleve.html':'inscription-eleve',
  '/inscription-responsable':'inscription-responsable','/inscription-responsable.html':'inscription-responsable',
  '/dashboard-eleve':'dashboard-eleve','/dashboard-eleve.html':'dashboard-eleve',
  '/dashboard-responsable':'dashboard-responsable','/dashboard-responsable.html':'dashboard-responsable',
  '/abonnement':'abonnement','/abonnement.html':'abonnement','/abonnements':'abonnement',
  '/cours':'cours','/cours.html':'cours',
  '/evaluation':'evaluation','/evaluation.html':'evaluation',
  '/admin':'admin',
  '/mon-avenir':'mon-avenir',
  '/mon-avenir.html':'mon-avenir','/admin.html':'admin',
  '/':'accueil'
};

function aller(page) {
  if (!PB[page]) page = 'accueil';
  
  // Appliquer les styles
  document.getElementById('STYLE_GLOBAL').textContent = BASE_CSS + decode(SB[page]||'');
  
  // Afficher le contenu
  var app = document.getElementById('APP');
  app.innerHTML = decode(PB[page]);
  
  window.scrollTo(0,0);
  history.pushState({p:page},'','#'+page);
  
  // Réexécuter les scripts inline de la page
  var scripts = app.querySelectorAll('script');
  scripts.forEach(function(sc){
    var n = document.createElement('script');
    n.textContent = sc.textContent;
    document.head.appendChild(n);
    document.head.removeChild(n);
  });
}

// Intercepter les liens
document.addEventListener('click', function(e){
  var a = e.target.closest('a[href]');
  if (!a) return;
  var h = a.getAttribute('href')||'';
  if (h.startsWith('http')||h.startsWith('mailto')||h.startsWith('#')||h.startsWith('tel')) return;
  var dest = ROUTE_MAP[h];
  if (dest) { e.preventDefault(); aller(dest); }
});

// Navigation par hash
window.addEventListener('hashchange', function(){
  var hash = window.location.hash.replace('#','');
  if (hash && PB[hash]) aller(hash);
});

// Exposer globalement
window.naviguer = aller;
window.allerPage = aller;

// DÉMARRAGE IMMÉDIAT
aller('accueil');
</script>
